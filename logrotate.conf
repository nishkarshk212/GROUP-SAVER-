# Logrotate configuration for NSFW Bot
# Auto-rotates and cleans up bot logs daily

/var/log/nsfw-bot/*.log {
    daily
    rotate 1
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    size 10M
    postrotate
        # Reload systemd journal to pick up new log files
        systemctl kill -s HUP rsyslog.service 2>/dev/null || true
    endscript
}

# Systemd journal cleanup
# This is handled by journalctl --vacuum-time=1d in the cleanup script
# But you can also configure journald.conf for automatic cleanup:
# 
# Edit /etc/systemd/journald.conf:
# [Journal]
# SystemMaxUse=500M
# SystemKeepFree=1G
# SystemMaxFileSize=50M
# MaxRetentionSec=1day
